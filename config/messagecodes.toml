#  Severity-Logik (eigene Heuristik, nicht von der DB):
#    critical — Gefährliches Ereignis, Totalausfall, Strecken dicht
#    high     — Längere Verzögerungen wahrscheinlich (Oberleitung, Weichen,
#               Polizei, Notarzt, Tür, Streik, Witterung extrem)
#    medium   — Planbare Verspätung (Personal, Disposition, Zugfolge)
#    low      — Kurze/geringe Verspätung (Reisendenverhalten, Ladearbeiten)
# ------------------------------------------------------------------------------------------
#  (C) Copyright 2026 Bartosz Stryjewski
#  All rights reserved
