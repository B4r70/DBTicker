# ==========================================================================================
#  BartoAI / DBTicker — Pendel-Routen
# ==========================================================================================
#  Source  : Manuell gepflegt
#  Refs    : from_station / to_station → Keys aus mystations.toml
# ==========================================================================================

# -------------------------------------------------------------------------------------------
# - Feld-Referenz
# -------------------------------------------------------------------------------------------
# id                            - Eindeutige ID für State-Files und Logs
# label                         - Menschenlesbare Beschreibung (für Telegram)
# from_station                  - Station-Key (siehe mystations.toml)
# to_station                    - Station-Key (siehe mystations.toml)
# scheduled_departure           - Planmäßige Abfahrt "HH:MM" (lokal, Europe/Berlin)
# check_window_before_min       - Wie viele Minuten vor Abfahrt beginnt das Checken?
# check_window_after_min        - Wie viele Minuten nach Abfahrt hört es auf?
# alert_threshold_min           - Ab welcher Verspätung wird gepingt?
# active_days                   - ["mo", "tu", "we", "th", "fr", "sa", "su"]
# all_clear_window_start_min    -  Wie viele Minuten vor Abfahrt beginnt das All-Clear-Fenster?
# all_clear_window_end_min      - Wie viele Minuten vor Abfahrt endet das All-Clear
# my_departure_time             - Ab wann starte ich von Zuhause
# my_departure_label            - Label für die Meldung über Telegram
# delay_shifts_my_time          - Im Falle einer Verspätung meine Zeit verschieben
# arrival_destination           - Wo komme ich tatsächlich an? (für intelligentere Meldungen)
# arrival_offset_min            - Minuten von Zugabkommen bis "vor Ort" (für intelligent
# -------------------------------------------------------------------------------------------

# -------------------------------------------------------------------------------------------
# - Vorgaben für die Rückfahrt am Morgen
# -------------------------------------------------------------------------------------------
[[routes]]
id                         = "hin-0628"
label                      = "🚆 Morgens Bad Ems → Koblenz"
from_station               = "badems"
to_station                 = "niederlahnstein"
scheduled_departure        = "06:28"
line                       = "RB23"
via_station                = "niederlahnstein"
check_window_before_min    = 35
check_window_after_min     = 5
alert_threshold_min        = 3
active_days                = ["mo", "tu", "th", "fr"]

# All-Clear-Fenster: 06:03–06:07 (Kaffee auf der Terrasse, Handy-Check)
all_clear_window_start_min = 28
all_clear_window_end_min   = 24

# Tagesablauf-Bezug
my_departure_time          = "06:15"
my_departure_label         = "mit dem E-Bike losfahren"
delay_shifts_my_time       = true     # bei Verspätung: kannst später los
arrival_destination        = "prosozial"
arrival_offset_min         = 8        # 3 Min Rad von Niederlahnstein zu prosozial2   
max_delay_tracking_min     = 30          

# -------------------------------------------------------------------------------------------
# - Vorgaben für die Rückfahrt am Nachmittag
# -------------------------------------------------------------------------------------------
